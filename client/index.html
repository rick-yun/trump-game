<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>升级（拖拉机）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- 登录 -->
  <div id="login-panel" class="panel center">
    <div class="logo">🃏</div>
    <h1>升级</h1>
    <p class="sub">4人联机 · 2v2对抗</p>
    <div class="form">
      <input type="text" id="player-name" placeholder="输入昵称" maxlength="10" value="">
      <input type="text" id="room-id" placeholder="房间号（如 8888）" maxlength="10" value="">
      <button id="btn-join" class="btn-primary">加入房间</button>
    </div>
    <div class="tip">💡 和好友约定同一个房间号即可同局</div>
  </div>

  <!-- 房间 -->
  <div id="room-panel" class="panel hidden">
    <div class="room-header">
      <div class="room-tag">房间 <span id="room-id-display"></span></div>
      <div class="room-status" id="room-status">等待玩家加入...</div>
    </div>
    <div id="players-list" class="players-list"></div>
    <div class="room-actions">
      <button id="btn-ready" class="btn-primary">准备</button>
      <button id="btn-cancel-ready" class="btn-secondary">取消</button>
      <button id="btn-start" class="btn-accent hidden">开始游戏</button>
    </div>
  </div>

  <!-- 游戏 -->
  <div id="game-panel" class="panel hidden">
    <!-- 顶部信息 -->
    <div class="game-header">
      <div class="info-pill">房间 <span id="g-room"></span></div>
      <div class="info-pill">打 <span id="g-level" class="highlight"></span></div>
      <div class="info-pill">主 <span id="g-trump"></span></div>
      <div class="info-pill">墩 <span id="g-trick"></span></div>
      <div class="info-pill score">我方 <span id="g-score-us" class="highlight"></span> : 对方 <span id="g-score-them"></span></div>
    </div>

    <!-- 牌桌 -->
    <div class="table">
      <div id="seat-top" class="seat"></div>
      <div id="seat-left" class="seat"></div>
      <div id="seat-right" class="seat"></div>
      <div class="table-center">
        <div id="trick-area" class="trick-area"></div>
        <div id="table-msg" class="table-msg"></div>
      </div>
      <div id="seat-me" class="seat me"></div>
    </div>

    <!-- 操作区 -->
    <div id="action-bar" class="action-bar">
      <div id="action-msg" class="action-msg"></div>
      <div id="action-btns" class="action-btns"></div>
    </div>

    <!-- 手牌 -->
    <div class="hand-section">
      <div id="hand-cards" class="hand-cards"></div>
    </div>

    <!-- 聊天 -->
    <div class="chat-box">
      <div id="chat-history" class="chat-history"></div>
      <div class="chat-input-wrap">
        <input type="text" id="chat-input" placeholder="按回车发消息" maxlength="50">
        <button id="btn-send">➤</button>
      </div>
    </div>
  </div>

  <!-- 结算 -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-icon">🎉</div>
      <h2>本局结束</h2>
      <div id="result-text" class="result-text"></div>
      <div id="result-scores" class="result-scores"></div>
      <button id="btn-next" class="btn-primary">准备下一局</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
