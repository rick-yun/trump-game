<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>升级（拖拉机）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- 登录/加入房间 -->
  <div id="login-panel" class="panel">
    <h1>🃏 升级（拖拉机）</h1>
    <p>4人联机，2v2对抗</p>
    <input type="text" id="player-name" placeholder="输入你的昵称" maxlength="10" value="">
    <input type="text" id="room-id" placeholder="输入房间号（如 8888）" maxlength="10" value="">
    <button id="btn-join">加入房间</button>
    <div id="login-tip">💡 和好友约定同一个房间号即可同局</div>
  </div>

  <!-- 房间等待 -->
  <div id="room-panel" class="panel hidden">
    <h2>房间：<span id="room-id-display"></span></h2>
    <div id="players-list" class="players-list"></div>
    <div id="room-actions">
      <button id="btn-ready" class="btn-primary">准备</button>
      <button id="btn-cancel-ready">取消准备</button>
      <button id="btn-start" class="btn-primary hidden">开始游戏（房主）</button>
    </div>
    <div id="room-tip"></div>
  </div>

  <!-- 游戏主界面 -->
  <div id="game-panel" class="panel hidden">
    <!-- 顶部信息栏 -->
    <div class="top-bar">
      <div class="info-item">房间：<span id="g-room"></span></div>
      <div class="info-item">打：<span id="g-level"></span></div>
      <div class="info-item">主：<span id="g-trump"></span></div>
      <div class="info-item">墩：<span id="g-trick">0/25</span></div>
      <div class="info-item">分：<span id="g-score"></span></div>
    </div>

    <!-- 牌桌 -->
    <div class="table-area">
      <div id="seats" class="seats"></div>
      <div id="trick-area" class="trick-area"></div>
    </div>

    <!-- 操作区 -->
    <div id="action-area" class="action-area">
      <div id="msg-area" class="msg-area"></div>
      <div id="btn-area" class="btn-area"></div>
    </div>

    <!-- 手牌区 -->
    <div id="hand-area" class="hand-area">
      <div id="hand-cards" class="hand-cards"></div>
    </div>

    <!-- 聊天 -->
    <div class="chat-wrap">
      <div id="chat-history" class="chat-history"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="按回车发送消息" maxlength="50">
        <button id="btn-send">发送</button>
      </div>
    </div>
  </div>

  <!-- 结算弹窗 -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2>🎉 本局结束</h2>
      <div id="result-text"></div>
      <div id="result-scores"></div>
      <button id="btn-next" class="btn-primary">准备下一局</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
